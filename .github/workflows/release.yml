name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o darkreel-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: darkreel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: darkreel-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Create checksums and sign
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          for dir in darkreel-*/; do
            cp "$dir"/* . 2>/dev/null || true
          done
          sha256sum darkreel-* > checksums.txt
          cat checksums.txt

          # Sign each binary with Ed25519 — key passed via fd, never written to disk
          for bin in darkreel-linux-*; do
            sha256sum "$bin" | awk '{print $1}' | tr -d '\n' > "$bin.hash"
            openssl pkeyutl -sign -inkey <(printf '%s' "$SIGNING_KEY") -rawin -in "$bin.hash" -out "$bin.sig"
            rm -f "$bin.hash"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            darkreel-linux-*
            *.sig
            checksums.txt
