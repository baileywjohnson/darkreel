name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and sign
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          # Update SRI hashes before building so the embedded index.html matches the JS/CSS
          bash build.sh
          # Rebuild with release flags (build.sh uses default flags)
          go build -trimpath -ldflags="-s -w" -o darkreel .

          # Create hash and sign it with Ed25519 — key passed via fd, never written to disk
          sha256sum darkreel > darkreel.sha256
          awk '{print $1}' darkreel.sha256 | tr -d '\n' > darkreel.hash
          openssl pkeyutl -sign -inkey <(printf '%s' "$SIGNING_KEY") -rawin -in darkreel.hash -out darkreel.sig
          rm -f darkreel.hash

          echo "Binary hash:"
          cat darkreel.sha256

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Use known host key from secrets to prevent MITM on first connect.
          # The secret value should be the full ssh-keyscan output line, e.g.:
          #   hostname ssh-ed25519 AAAAC3...
          echo "$VPS_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -i ~/.ssh/deploy_key"

          # Copy binary, hash, and signature to VPS
          scp $SSH_OPTS darkreel darkreel.sha256 darkreel.sig deploy@"$VPS_HOST":~/

          # Verify signature, verify hash, then deploy
          ssh $SSH_OPTS deploy@"$VPS_HOST" '
            set -e

            # Verify the signature against the hash using the public key
            awk "{print \$1}" darkreel.sha256 | tr -d "\n" > darkreel.hash
            openssl pkeyutl -verify -pubin \
              -inkey /etc/darkreel/signing.pub \
              -rawin -in darkreel.hash -sigfile darkreel.sig

            # Verify the binary matches the hash
            sha256sum -c darkreel.sha256

            # Deploy
            sudo systemctl stop darkreel
            sudo cp /home/deploy/darkreel /usr/local/bin/darkreel
            sudo systemctl start darkreel
            sleep 2
            curl -sf http://127.0.0.1:8080/health || echo "WARNING: health check failed"

            rm -f darkreel darkreel.sha256 darkreel.sig darkreel.hash
          '
          rm -f ~/.ssh/deploy_key
